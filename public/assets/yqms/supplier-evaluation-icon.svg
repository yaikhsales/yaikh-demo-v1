<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ══ CLIPBOARD (Left Side) ══ -->
  <rect x="30" y="25" width="75" height="100" rx="4" stroke="#2563EB" stroke-width="6" fill="white"/>
  <!-- Clip -->
  <rect x="52" y="18" width="30" height="15" rx="4" stroke="#2563EB" stroke-width="5" fill="white"/>
  <rect x="60" y="16" width="14" height="6" rx="2" stroke="#2563EB" stroke-width="4" fill="white"/>
  <!-- Checklist -->
  <rect x="42" y="48" width="12" height="12" rx="2" stroke="#2563EB" stroke-width="4" fill="white"/>
  <rect x="42" y="68" width="12" height="12" rx="2" stroke="#2563EB" stroke-width="4" fill="white"/>
  <rect x="42" y="88" width="12" height="12" rx="2" stroke="#2563EB" stroke-width="4" fill="white"/>
  <rect x="42" y="108" width="12" height="12" rx="2" stroke="#2563EB" stroke-width="4" fill="white"/>
  <line x1="62" y1="54" x2="92" y2="54" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="74" x2="92" y2="74" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="94" x2="92" y2="94" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>

  <!-- ══ USERS + GEAR (Top Right) ══ -->
  <g transform="translate(115, 35) scale(0.6)">
    <!-- Person 1 -->
    <circle cx="20" cy="20" r="10" stroke="#2563EB" stroke-width="7" fill="white"/>
    <path d="M5 45 Q20 30 35 45" stroke="#2563EB" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Person 2 -->
    <circle cx="55" cy="20" r="10" stroke="#2563EB" stroke-width="7" fill="white"/>
    <path d="M40 45 Q55 30 70 45" stroke="#2563EB" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Gear -->
    <g transform="translate(35, 45) rotate(22)">
      <circle cx="15" cy="15" r="9" stroke="#2563EB" stroke-width="6" fill="white"/>
      <path d="M15 2 L15 5 M15 25 L15 28 M2 15 L5 15 M25 15 L28 15" stroke="#2563EB" stroke-width="4" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ══ BAR GRAPH (Bottom Left) ══ -->
  <g transform="translate(35, 140) scale(0.8)">
    <line x1="0" y1="45" x2="60" y2="45" stroke="#2563EB" stroke-width="6" stroke-linecap="round"/>
    <rect x="8" y="25" width="12" height="20" rx="3" stroke="#2563EB" stroke-width="4" fill="white"/>
    <rect x="25" y="10" width="12" height="35" rx="3" stroke="#2563EB" stroke-width="4" fill="white"/>
    <rect x="42" y="20" width="12" height="25" rx="3" stroke="#2563EB" stroke-width="4" fill="white"/>
    <polyline points="2,32 25,12 42,22 58,5" stroke="#2563EB" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M50 5 L58 5 L58 13" stroke="#2563EB" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ══ GOLD SEAL (Bottom Right) ══ -->
  <g transform="translate(115, 135) scale(0.9)">
    <path d="M10 30 L2 55 L10 48 L18 55 L10 30 Z" fill="#2563EB"/>
    <path d="M30 30 L22 55 L30 48 L38 55 L30 30 Z" fill="#2563EB"/>
    <circle cx="20" cy="20" r="21" fill="white" stroke="#2563EB" stroke-width="5"/>
    <circle cx="20" cy="20" r="16" fill="#FBBF24"/>
    <path d="M20 9 L23 16 L31 16 L25 21 L27 28 L20 24 L13 28 L15 21 L9 16 L17 16 Z" fill="white"/>
  </g>

  <!-- ══ MAGNIFYING GLASS (Center Right) ══ -->
  <g transform="translate(95, 80)">
    <circle cx="35" cy="35" r="28" fill="white" stroke="#2563EB" stroke-width="8"/>
    <polyline points="22,35 30,43 48,27" stroke="#2563EB" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="58" y1="58" x2="78" y2="78" stroke="#2563EB" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- ══ CENTRAL ORANGE CHECKMARK (High Prominence) ══ -->
  <polyline points="85,65 115,100 165,40" stroke="#FBBF24" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
</svg>
