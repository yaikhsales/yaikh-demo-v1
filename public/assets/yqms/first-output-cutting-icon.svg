    <path d="M80 40 L150 40 C165 40 165 75 150 75 L80 75 C65 75 65 40 80 40" stroke="#1D4ED8" stroke-width="10" fill="white"/>
    <circle cx="150" cy="57" r="10" stroke="#1D4ED8" stroke-width="6" fill="white"/>
    <path d="M110 75 L110 130 L160 130 L160 75" stroke="#1D4ED8" stroke-width="10" fill="white" stroke-linejoin="round"/>
    
    <!-- Scissors -->
