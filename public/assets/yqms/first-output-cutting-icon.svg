      <!-- Handles -->
      <circle cx="25" cy="25" r="20" stroke="#F59E0B" stroke-width="12" fill="white"/>
      <circle cx="25" cy="75" r="20" stroke="#F59E0B" stroke-width="12" fill="white"/>
