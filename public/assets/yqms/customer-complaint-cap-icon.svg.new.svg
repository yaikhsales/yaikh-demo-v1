<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ══ CLIPBOARD (Right Side) ══ -->
  <g transform="translate(110, 45)">
    <!-- Clipboard Body -->
    <rect x="0" y="0" width="70" height="90" rx="6" stroke="#2166AC" stroke-width="6" fill="white"/>
    <!-- Clip -->
    <path d="M20 -5 L50 -5 Q55 -5 55 0 L55 5 L15 5 L15 0 Q15 -5 20 -5" stroke="#2166AC" stroke-width="6" fill="white"/>
    <rect x="25" y="-12" width="20" height="8" rx="2" stroke="#2166AC" stroke-width="4" fill="white"/>
    
    <!-- CHECKMARK (Inside Clipboard) -->
    <polyline points="15,45 35,65 65,25" stroke="#F59E0B" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ══ SPEECH BUBBLE (Left Side) ══ -->
  <g transform="translate(25, 40)">
    <path d="M0 30 Q0 0 40 0 Q80 0 80 30 Q80 60 45 60 L25 75 L30 60 Q0 60 0 30" stroke="#2166AC" stroke-width="6" fill="white" stroke-linejoin="round"/>
    <!-- Exclamation Mark -->
    <rect x="36" y="15" width="8" height="22" rx="4" fill="#F59E0B"/>
    <circle cx="40" cy="48" r="5" fill="#F59E0B"/>
  </g>

  <!-- ══ WRENCH (Center/Handle) ══ -->
  <g transform="translate(45, 115) rotate(-45)">
    <!-- Handle -->
    <path d="M0 0 L80 0" stroke="#2166AC" stroke-width="12" stroke-linecap="round"/>
    <!-- Open End -->
    <g transform="translate(80, 0)">
       <circle cx="0" cy="0" r="18" stroke="#2166AC" stroke-width="8" fill="white" />
       <rect x="-5" y="-10" width="25" height="20" fill="white" />
       <path d="M5 -10 L20 -10 M5 10 L20 10" stroke="#2166AC" stroke-width="6" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Let's try a better Wrench path matching the image -->
  <!-- Wrench starting from bottom left to center -->
  <path d="M45 155 L105 85" stroke="#2166AC" stroke-width="12" stroke-linecap="round" />
  <g transform="translate(115, 75) rotate(-45)">
     <path d="M-15 -10 Q-25 -25 0 -25 Q25 -25 15 -10 L25 0 Q35 15 15 25 Q-5 35 -15 15 Z" fill="white" stroke="#2166AC" stroke-width="6" />
     <rect x="-8" y="-15" width="16" height="15" fill="white" />
  </g>

  <!-- ══ GEAR (Bottom) ══ -->
  <g transform="translate(100, 160)">
    <circle cx="0" cy="0" r="15" stroke="#2166AC" stroke-width="6" fill="white"/>
    <path d="M0 -22 L0 -16 M0 16 L0 22 M-22 0 L-16 0 M16 0 L22 0 M-15 -15 L-11 -11 M11 11 L15 15 M-15 15 L-11 11 M11 -11 L15 -15" stroke="#2166AC" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
