<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 210" fill="none" stroke="#1d60cc" stroke-linecap="round" stroke-linejoin="round">

  <!-- === CLIPBOARD (back, top-left) === -->
  <rect x="28" y="20" width="58" height="76" rx="4" stroke-width="5" fill="white"/>
  <!-- Clipboard top clip -->
  <rect x="43" y="13" width="28" height="14" rx="6" stroke-width="4.5" fill="white"/>
  <!-- Checkbox + lines -->
  <rect x="35" y="38" width="10" height="10" rx="2" stroke-width="3.5" fill="none"/>
  <polyline points="37,43 40,46 44,40" stroke-width="3" fill="none"/>
  <line x1="50" y1="43" x2="80" y2="43" stroke-width="3.5"/>
  <rect x="35" y="54" width="10" height="10" rx="2" stroke-width="3.5" fill="none"/>
  <line x1="50" y1="59" x2="80" y2="59" stroke-width="3.5"/>
  <line x1="35" y1="75" x2="80" y2="75" stroke-width="3.5"/>
  <line x1="35" y1="86" x2="72" y2="86" stroke-width="3.5"/>

  <!-- === CLOUD UPLOAD (top-right) === -->
  <path d="M138 34 C138 24 146 17 156 19 C159 11 169 7 177 13 C184 13 188 21 185 28 C190 31 189 41 184 43 L143 43 C138 43 138 34 138 34Z" stroke-width="4.5" fill="white"/>
  <!-- Upload arrow -->
  <line x1="163" y1="51" x2="163" y2="68" stroke-width="4.5"/>
  <polyline points="155,60 163,51 171,60" stroke-width="4.5" fill="none"/>

  <!-- === MAGNIFYING GLASS with checkmark (center-left, overlapping) === -->
  <circle cx="74" cy="108" r="32" stroke-width="5.5" fill="white"/>
  <!-- Checkmark inside glass -->
  <polyline points="59,108 70,120 91,94" stroke-width="6" fill="none"/>
  <!-- Glass handle -->
  <line x1="97" y1="132" x2="114" y2="150" stroke-width="9" stroke-linecap="round"/>

  <!-- === OPEN BOX (front-right, 3D perspective) === -->
  <!-- Box body front face -->
  <path d="M90 148 L90 193 L175 193 L175 148 Z" stroke-width="5" fill="white"/>
  <!-- Box right side face -->
  <path d="M175 148 L190 138 L190 183 L175 193 Z" stroke-width="5" fill="white"/>
  <!-- Box flap left (open) -->
  <path d="M90 148 L78 126 L133 126 L133 148" stroke-width="5" fill="white"/>
  <!-- Box flap right (open) -->
  <path d="M175 148 L188 126 L133 126" stroke-width="5" fill="white"/>
  <!-- Box tape on front -->
  <line x1="118" y1="148" x2="147" y2="148" stroke-width="5.5"/>
  <!-- Garment / fabric inside box (wavy folds) -->
  <path d="M98 168 Q108 158 120 165 Q132 158 144 165 Q156 158 168 165" stroke-width="4" fill="none"/>
  <path d="M98 178 Q108 168 120 175 Q132 168 144 175 Q156 168 168 175" stroke-width="4" fill="none"/>
</svg>
