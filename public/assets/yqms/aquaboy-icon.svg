<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- ══ BACKGROUND CLOUD/SHAPE (Light Teal Tint) ══ -->
  <rect x="20" y="20" width="160" height="160" rx="40" fill="#E0F2F1" opacity="0.3"/>

  <!-- ══ WATER DROP (Top Right) ══ -->
  <path d="M155 45 Q155 70 140 70 Q125 70 125 45 Q125 25 140 10 Q155 25 155 45 Z" stroke="#1D4ED8" stroke-width="5" fill="white"/>
  <path d="M142 45 C142 55 135 62 140 62" stroke="#1D4ED8" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- ══ ROBOT BODY ══ -->
  <g transform="translate(100, 100)">
    <!-- Pill Head -->
    <rect x="-45" y="-60" width="90" height="60" rx="30" stroke="#1D4ED8" stroke-width="6" fill="white"/>
    <!-- Screen -->
    <rect x="-32" y="-50" width="64" height="40" rx="15" stroke="#1D4ED8" stroke-width="4" fill="#F0FDFA"/>
    <!-- Eyes -->
    <circle cx="-15" cy="-30" r="5" fill="#1D4ED8"/>
    <circle cx="15" cy="-30" r="5" fill="#1D4ED8"/>
    <!-- Smile -->
    <path d="M-8 -22 Q0 -15 8 -22" stroke="#1D4ED8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Antenna -->
    <line x1="0" y1="-60" x2="0" y2="-75" stroke="#1D4ED8" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-80" r="5" stroke="#1D4ED8" stroke-width="4" fill="white"/>

    <!-- Torso -->
    <path d="M-35 15 L35 15 L25 55 Q 0 75 -25 55 Z" stroke="#1D4ED8" stroke-width="6" fill="white"/>
    <!-- Central Moisture Gauge -->
    <circle cx="0" cy="38" r="16" stroke="#1D4ED8" stroke-width="4" fill="white"/>
    <circle cx="0" cy="38" r="10" fill="#2DD4BF" opacity="0.3"/>
    
    <!-- Arm/Probe Connection -->
    <path d="M-35 25 L-55 25 L-55 80" stroke="#1D4ED8" stroke-width="6" fill="none" stroke-linejoin="round"/>
    <!-- Shoulder -->
    <rect x="-45" y="15" width="20" height="30" rx="8" stroke="#1D4ED8" stroke-width="4" fill="white"/>
  </g>

  <!-- ══ SENSOR PROBE (Left) ══ -->
  <g transform="translate(30, 100)">
    <rect x="-10" y="-40" width="20" height="60" rx="5" stroke="#1D4ED8" stroke-width="5" fill="white"/>
    <rect x="-6" y="-65" width="12" height="25" rx="3" stroke="#1D4ED8" stroke-width="4" fill="white"/>
    <line x1="0" y1="-45" x2="0" y2="-55" stroke="#1D4ED8" stroke-width="3"/>
  </g>

  <!-- ══ DIGITAL DISPLAY PANEL (Right) ══ -->
  <g transform="translate(145, 125)">
    <rect x="-40" y="-30" width="80" height="60" rx="10" stroke="#1D4ED8" stroke-width="6" fill="white"/>
    <!-- Numbers "50%" -->
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="24" fill="#1D4ED8">50%</text>
    <!-- Checkmark -->
    <path d="M15 -15 L22 -8 L35 -25" stroke="#14B8A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
