<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- Folded fabric / book at bottom -->
  <rect x="28" y="78" width="64" height="12" rx="3" fill="none"/>
  <line x1="60" y1="78" x2="60" y2="90"/>
  <path d="M28 84 Q44 80 60 84 Q76 88 92 84"/>
  <!-- book spine clip -->
  <rect x="26" y="88" width="68" height="6" rx="2" fill="none"/>

  <!-- Cloud upload -->
  <path d="M62 68 Q62 56 72 56 Q74 48 82 48 Q92 48 92 58 Q98 58 98 65 Q98 72 90 72 L66 72 Q58 72 58 65 Q58 60 62 60Z"/>
  <line x1="79" y1="68" x2="79" y2="58"/>
  <polyline points="74,62 79,57 84,62"/>

  <!-- Clipboard -->
  <rect x="64" y="18" width="30" height="38" rx="3" fill="white" stroke="#2563EB" stroke-width="2.5"/>
  <rect x="70" y="14" width="18" height="8" rx="3" fill="white" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="69" y1="30" x2="89" y2="30" stroke="#2563EB" stroke-width="2"/>
  <line x1="69" y1="37" x2="89" y2="37" stroke="#2563EB" stroke-width="2"/>
  <line x1="69" y1="44" x2="82" y2="44" stroke="#2563EB" stroke-width="2"/>
  <!-- clipboard checkmark -->
  <polyline points="72,23 76,27 84,21" stroke="#2563EB" stroke-width="2.5" fill="none"/>

  <!-- Magnifying glass circle -->
  <circle cx="42" cy="52" r="22" fill="white" stroke="#2563EB" stroke-width="3.5"/>
  <!-- Checkmark inside magnifying glass -->
  <polyline points="33,52 40,59 52,44" stroke="#2563EB" stroke-width="3.5" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="58" y1="68" x2="70" y2="80" stroke="#2563EB" stroke-width="5" stroke-linecap="round"/>
</svg>
