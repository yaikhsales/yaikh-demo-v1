<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Decorative dots -->
  <circle cx="14" cy="70" r="3" fill="#2563EB" opacity="0.5"/>
  <circle cx="22" cy="58" r="2" fill="#2563EB" opacity="0.4"/>
  <circle cx="8"  cy="58" r="1.5" fill="#2563EB" opacity="0.3"/>
  <circle cx="185" cy="80" r="3" fill="#2563EB" opacity="0.5"/>
  <circle cx="178" cy="68" r="2" fill="#2563EB" opacity="0.3"/>
  <circle cx="170" cy="76" r="1.5" fill="#2563EB" opacity="0.35"/>
  <circle cx="140" cy="100" r="3" fill="#2563EB" opacity="0.4"/>
  <circle cx="148" cy="91"  r="2" fill="#2563EB" opacity="0.3"/>

  <!-- ── Bar chart (top-left) ── -->
  <!-- Baseline -->
  <line x1="22" y1="72" x2="80" y2="72" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <!-- Bar 1 (short) -->
  <rect x="28" y="54" width="10" height="18" rx="2" stroke="#2563EB" stroke-width="3" fill="none"/>
  <!-- Bar 2 (medium) -->
  <rect x="44" y="44" width="10" height="28" rx="2" stroke="#2563EB" stroke-width="3" fill="none"/>
  <!-- Bar 3 (tall) -->
  <rect x="60" y="32" width="10" height="40" rx="2" stroke="#2563EB" stroke-width="3" fill="none"/>
  <!-- Small scatter dots on bar chart -->
  <circle cx="25" cy="60" r="2" fill="#2563EB" opacity="0.5"/>
  <circle cx="23" cy="68" r="1.5" fill="#2563EB" opacity="0.4"/>

  <!-- ── Pie / donut chart (top-right) ── -->
  <!-- Small circle above pie -->
  <circle cx="132" cy="22" r="4" stroke="#2563EB" stroke-width="2.5" fill="none"/>
  <!-- Main pie circle -->
  <circle cx="148" cy="48" r="28" stroke="#2563EB" stroke-width="3" fill="none"/>
  <!-- Cut slice (top-right quarter missing) -->
  <!-- Draw filled arc for the "missing" slice highlight -->
  <path d="M148 48 L148 20 A28 28 0 0 1 176 48 Z" stroke="#2563EB" stroke-width="3" stroke-linejoin="round" fill="white"/>
  <!-- Slice divider lines -->
  <line x1="148" y1="48" x2="148" y2="20" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="48" x2="176" y2="48" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>

  <!-- ── Trend line with arrow (middle-right) ── -->
  <!-- Arrow -->
  <polyline points="90,90 120,68 158,38" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="147,32 158,38 152,49" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Line chart dots connected -->
  <circle cx="100" cy="114" r="5" stroke="#2563EB" stroke-width="3" fill="white"/>
  <circle cx="122" cy="100" r="5" stroke="#2563EB" stroke-width="3" fill="white"/>
  <circle cx="144" cy="108" r="5" stroke="#2563EB" stroke-width="3" fill="white"/>
  <polyline points="100,114 122,100 144,108" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Magnifying glass with checkmark (center-left) ── -->
  <!-- Circle of magnifier -->
  <circle cx="62" cy="112" r="26" stroke="#2563EB" stroke-width="3.5" fill="white"/>
  <!-- Handle -->
  <line x1="80" y1="130" x2="96" y2="146" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Checkmark inside magnifier -->
  <polyline points="50,113 59,122 76,103" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ── Tablet / ID card (bottom) ── -->
  <rect x="50" y="148" width="100" height="44" rx="8" stroke="#2563EB" stroke-width="3" fill="white"/>
  <!-- Home button line at bottom of tablet -->
  <line x1="93" y1="189" x2="107" y2="189" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Person icon (circle head + body arc) -->
  <circle cx="70" cy="161" r="7" stroke="#2563EB" stroke-width="2.5" fill="none"/>
  <path d="M57 182 Q57 171 70 171 Q83 171 83 182" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Text lines beside person -->
  <line x1="90" y1="159" x2="128" y2="159" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="167" x2="122" y2="167" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="175" x2="126" y2="175" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
</svg>
